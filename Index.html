<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raymex | Central de Activos</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c5a059">

    <script>
        // Registrar el motor de la App
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Lógica de Acceso SOM V11
        function entrar() {
            const llave = document.getElementById('passkey').value.trim().toUpperCase();
            
            if (llave === 'RUIZ_MASTER') {
                alert('BIENVENIDO DIRECTOR. ACCESO TOTAL.');
                window.location.href = 'https://tu-plataforma-real.com/admin'; 
            } else if (llave === 'HIJA_CONTROL') {
                alert('ACCESO SUPERVISORA. MONITOR ACTIVO.');
                window.location.href = 'https://tu-plataforma-real.com/supervision';
            } else if (llave === 'ROBERTO_SENTINEL') {
                alert('CENTINELA ACTIVADO. MONITOR DE INTEGRIDAD.');
                window.location.href = 'https://tu-plataforma-real.com/sentinel';
            } else {
                alert('LLAVE NO RECONOCIDA. RIGOR ABSOLUTO.');
            }
        }
    </script>

    <style>
        body { background: #050b14; color: #c5a059; font-family: sans-serif; text-align: center; padding-top: 50px; }
        input { padding: 12px; border: 1px solid #c5a059; background: #0a101e; color: white; width: 80%; max-width: 300px; text-align: center; margin-bottom: 20px; border-radius: 5px; }
        button { padding: 12px 40px; background: #c5a059; color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .logo { width: 150px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <img src="logo-raymex.png" alt="Raymex Logo" class="logo">
    <h1>GRUPO RAYMEX</h1>
    <p>SISTEMA OPERATIVO MAESTRO V11</p>
    <input type="password" id="passkey" placeholder="INGRESE LLAVE MAESTRA">
    <br>
    <button onclick="entrar()">Acceder al Sistema</button>
</body>
</html>
