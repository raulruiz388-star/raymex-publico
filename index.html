<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jeremy V23 | Platform Genesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --dark: #020617; --matrix-cyan: #22d3ee; }
        body { font-family: 'Urbanist', sans-serif; background: var(--dark); color: #f8fafc; margin: 0; overflow: hidden; height: 100vh; position: fixed; width: 100%; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Ajuste de Consola Móvil */
        .console-footer { 
            padding-bottom: calc(env(safe-area-inset-bottom) + 15px);
            background: linear-gradient(to top, var(--dark) 80%, transparent);
        }

        /* Botón Nexo Reforzado */
        .nexus-btn { 
            width: 60px; height: 60px; border-radius: 18px; 
            background: var(--matrix-cyan); display: flex; 
            align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
            touch-action: manipulation;
        }
        .nexus-btn:active { transform: scale(0.9); background: #fff; }

        #access-vault { position: fixed; inset: 0; z-index: 9999; background: var(--dark); display: flex; align-items: center; justify-content: center; }
        .key-badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 900; text-transform: uppercase; display: inline-flex; align-items: center; gap: 5px; }
    </style>
</head>
<body class="flex flex-col">

    <div id="access-vault">
        <div class="glass-panel p-8 rounded-[2rem] w-full max-w-sm text-center border-t-4 border-[#22d3ee] mx-4">
            <div class="w-16 h-16 bg-slate-900 rounded-full mx-auto mb-4 flex items-center justify-center border-2 border-[#22d3ee]">
                <span class="font-orbitron font-black text-xl text-white">GR</span>
            </div>
            <h2 class="font-orbitron text-xl font-black mb-1 text-white uppercase italic">Platform Genesis</h2>
            <p class="text-[8px] text-[#22d3ee] uppercase tracking-[0.3em] mb-6 font-black">Jeremy V23 | Control Nacional</p>
            <input type="password" id="vault-key" placeholder="LLAVE CRIPTOGRÁFICA" class="w-full bg-white/5 border border-white/10 rounded-xl py-4 text-center text-white mb-4 outline-none font-bold uppercase text-xs">
            <button onclick="authenticateKey()" class="w-full bg-[#22d3ee] text-slate-950 font-black py-4 rounded-xl uppercase italic tracking-widest active:scale-95 transition-all">Desbloquear</button>
        </div>
    </div>

    <div id="matrix-interface" class="hidden h-screen flex flex-col opacity-0 transition-opacity duration-500">
        <header class="p-4 border-b border-white/5 bg-slate-950/80 backdrop-blur-md flex justify-between items-center pt-[env(safe-area-inset-top)]">
            <div class="flex items-center gap-3">
                <img src="https://i.ibb.co/7NW9gd2F/1000644125-modified.png" class="h-8 w-8">
                <div>
                    <h1 class="text-[10px] font-orbitron font-black text-white uppercase tracking-widest">Jeremy <span class="text-[#22d3ee]">V23</span></h1>
                    <div id="active-badge" class="key-badge mt-0.5"><i class="fa-solid fa-crown"></i></div>
                </div>
            </div>
            <button onclick="location.reload()" class="p-2 text-slate-500"><i class="fa-solid fa-power-off text-lg"></i></button>
        </header>

        <main id="matrix-flow" class="flex-grow overflow-y-auto p-4 space-y-4">
            <div class="flex gap-3">
                <div class="w-8 h-8 rounded-lg bg-[#22d3ee] flex items-center justify-center shrink-0"><i class="fa-solid fa-network-wired text-black text-[10px]"></i></div>
                <div class="glass-panel p-4 rounded-xl rounded-tl-none border-l-2 border-[#22d3ee] max-w-[90%]">
                    <p class="text-[13px] text-slate-200 leading-snug italic font-medium">"Director, sistema optimizado para mando móvil. Estoy lista."</p>
                </div>
            </div>
        </main>

        <footer class="console-footer px-4 pt-2">
            <div class="flex items-center gap-2 max-w-5xl mx-auto bg-slate-900/50 p-2 rounded-2xl border border-white/5">
                <div class="relative flex-grow">
                    <textarea id="matrix-input" placeholder="Escribir comando..." class="w-full bg-transparent py-3 px-3 text-[14px] text-white outline-none h-12 resize-none leading-tight" rows="1"></textarea>
                </div>
                <button onclick="sendManualCommand()" class="p-3 text-[#22d3ee] active:scale-75 transition-transform">
                    <i class="fa-solid fa-paper-plane text-xl"></i>
                </button>
                <div id="matrix-voice" onclick="startVoiceAction()" class="nexus-btn">
                    <i id="mic-icon" class="fa-solid fa-microphone-lines text-black text-xl"></i>
                </div>
            </div>
        </footer>
    </div>

    <script>
        function authenticateKey() {
            const key = document.getElementById('vault-key').value.trim().toUpperCase();
            const badge = document.getElementById('active-badge');
            let auth = false;

            if (key === 'RUIZ_MASTER') { auth = true; badge.className = "key-badge bg-yellow-500/20 text-yellow-500 border border-yellow-500"; badge.innerHTML = 'ALFA'; }
            else if (key === 'CONTADOR_MASTER') { auth = true; badge.className = "key-badge bg-emerald-500/20 text-emerald-500 border border-emerald-500"; badge.innerHTML = 'BETA'; }
            else if (key === 'ABOGADO_MASTER') { auth = true; badge.className = "key-badge bg-red-500/20 text-red-500 border border-red-500"; badge.innerHTML = 'GAMMA'; }

            if (auth) {
                document.getElementById('access-vault').style.display = 'none';
                const ui = document.getElementById('matrix-interface');
                ui.classList.remove('hidden');
                setTimeout(() => ui.classList.add('opacity-100'), 50);
            } else { alert("ACCESO DENEGADO"); }
        }

        function appendLog(role, text) {
            const flow = document.getElementById('matrix-flow');
            const div = document.createElement('div');
            div.className = `flex gap-2 ${role === 'user' ? 'flex-row-reverse' : ''}`;
            div.innerHTML = `
                <div class="w-8 h-8 rounded-lg ${role==='user'?'bg-slate-700':'bg-[#22d3ee]'} flex items-center justify-center shrink-0">
                    <i class="fa-solid ${role==='user'?'fa-user':'fa-network-wired'} text-[10px] ${role==='user'?'text-white':'text-black'}"></i>
                </div>
                <div class="glass-panel p-3 rounded-xl max-w-[85%] border-l-2 ${role==='user'?'border-yellow-500':'border-[#22d3ee]'}">
                    <p class="text-[13px] text-slate-200">${text}</p>
                </div>`;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        function sendManualCommand() {
            const input = document.getElementById('matrix-input');
            const val = input.value.trim();
            if(!val) return;
            appendLog('user', val);
            input.value = '';
            setTimeout(() => appendLog('jeremy', "Comando recibido. Procesando bajo protocolo Génesis V23..."), 600);
        }

        function startVoiceAction() {
            const mic = document.getElementById('mic-icon');
            mic.classList.add('animate-pulse');
            mic.style.color = "white";
            // Simulación de escucha táctil reforzada
            setTimeout(() => {
                mic.classList.remove('animate-pulse');
                mic.style.color = "black";
                appendLog('jeremy', "Escucha activa: El sistema vocal requiere servidor HTTPS para transmisión de audio completa.");
            }, 2000);
        }

        // Ajuste para que el teclado no rompa el diseño
        document.getElementById('matrix-input').addEventListener('focus', () => {
            setTimeout(() => { document.getElementById('matrix-flow').scrollTop = document.getElementById('matrix-flow').scrollHeight; }, 300);
        });
    </script>
</body>
</html>
