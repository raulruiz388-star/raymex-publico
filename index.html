<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jeremy V23 | Platform Genesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --cyan: #22d3ee; --dark: #020617; }
        body, html { height: 100dvh; margin: 0; background: var(--dark); color: #f8fafc; font-family: 'Urbanist', sans-serif; overflow: hidden; position: fixed; width: 100%; }
        .glass { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        #matrix-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .console-footer { padding: 12px; padding-bottom: calc(env(safe-area-inset-bottom) + 12px); background: #020617; border-top: 1px solid rgba(34, 211, 238, 0.3); }
        .nexus-btn { width: 55px; height: 55px; border-radius: 15px; background: var(--cyan); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        textarea { user-select: text !important; -webkit-user-select: text !important; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="flex flex-col">

    <div id="access-vault" class="fixed inset-0 z-[9999] bg-[#020617] flex items-center justify-center p-6">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm text-center border-t-4 border-[#22d3ee]">
            <h2 class="font-orbitron text-xl font-black mb-1 text-white uppercase italic">Platform Genesis</h2>
            <p class="text-[8px] text-[#22d3ee] uppercase tracking-[0.3em] mb-8 font-black">Sistema Blindado V23</p>
            <input type="password" id="vault-key" placeholder="LLAVE MAESTRA" class="w-full bg-slate-900 border border-white/10 rounded-2xl py-4 text-center text-white mb-6 outline-none font-bold uppercase text-xs">
            <button onclick="authenticateKey()" class="w-full bg-[#22d3ee] text-slate-950 font-black py-4 rounded-2xl uppercase italic tracking-widest active:scale-95 transition-all">Desbloquear</button>
        </div>
    </div>

    <header class="p-4 bg-slate-950 flex justify-between items-center pt-[env(safe-area-inset-top)] border-b border-cyan-500/30">
        <div class="flex items-center gap-2">
            <img src="https://i.ibb.co/7NW9gd2F/1000644125-modified.png" class="h-8 w-8 object-contain">
            <h1 class="text-[10px] font-orbitron font-black text-white uppercase tracking-widest">Jeremy <span class="text-[#22d3ee]">V23</span></h1>
        </div>
        <div id="badge-display" class="px-2 py-1 rounded-md text-[8px] font-black uppercase bg-white/5 border border-white/10 text-white italic">ESPERANDO...</div>
    </header>

    <main id="matrix-flow"></main>

    <footer class="console-footer">
        <div class="flex items-center gap-2 max-w-5xl mx-auto">
            <div class="flex-grow bg-slate-900/80 rounded-xl border border-white/10 flex items-center px-3">
                <textarea id="matrix-input" placeholder="Comando estratégico..." spellcheck="true" class="w-full bg-transparent py-3 text-[15px] text-white outline-none h-11 resize-none" rows="1"></textarea>
                <button onclick="sendRealCommand()" class="p-2 text-[#22d3ee] active:scale-75"><i class="fa-solid fa-paper-plane text-lg"></i></button>
            </div>
            <div onclick="startVoiceAction()" class="nexus-btn active:scale-90"><i id="mic-icon" class="fa-solid fa-microphone text-black text-lg"></i></div>
        </div>
    </footer>

    <script>
        // === TUNEL SEGURO HACIA VERCEL YA ENSAMBLADO ===
        const URL_VERCEL = "https://jeremy-core-v23.vercel.app/api/chat"; 
        
        let currentAuthority = "";

        function authenticateKey() {
            const key = document.getElementById('vault-key').value.trim().toUpperCase();
            if (['RUIZ_MASTER', 'CONTADOR_MASTER', 'ABOGADO_MASTER'].includes(key)) {
                currentAuthority = key.split('_')[0];
                document.getElementById('badge-display').innerText = currentAuthority + " ACTIVE";
                document.getElementById('access-vault').style.display = 'none';
                appendLog('jeremy', "Director Ruiz, túnel seguro Vercel establecido. Inteligencia operativa al 100%. ¿Iniciamos la demostración del sistema para nuestro cliente?");
            } else { 
                alert("ACCESO DENEGADO - VERIFIQUE SU LLAVE"); 
            }
        }

        function appendLog(role, text) {
            const flow = document.getElementById('matrix-flow');
            const div = document.createElement('div');
            div.className = `flex gap-3 ${role === 'user' ? 'flex-row-reverse' : ''}`;
            div.innerHTML = `
                <div class="w-8 h-8 rounded-lg ${role==='user'?'bg-slate-700':'bg-[#22d3ee]'} flex items-center justify-center shrink-0">
                    <i class="fa-solid ${role==='user'?'fa-user-tie':'fa-robot'} text-[10px] ${role==='user'?'text-white':'text-black'}"></i>
                </div>
                <div class="glass p-3 rounded-xl max-w-[85%] ${role==='user'?'border-r-2 border-yellow-500':'border-l-2 border-[#22d3ee]'}">
                    <p class="text-[14px] text-slate-200">${text}</p>
                </div>`;
            flow.appendChild(div);
            setTimeout(() => { flow.scrollTop = flow.scrollHeight; }, 100);
        }

        async function sendRealCommand() {
            const input = document.getElementById('matrix-input');
            const text = input.value.trim();
            if(!text) return;
            
            appendLog('user', text);
            input.value = '';

            const thinkId = 'think-' + Date.now();
            appendLog('jeremy', `<span id="${thinkId}" class="animate-pulse">Consultando Red Segura...</span>`);

            try {
                const systemPrompt = `Eres Jeremy V23 Platform Genesis, el sistema de IA blindado de Grupo Raymex. 
                El CEO es Raúl Ruiz López (Cancún). Estás en una demostración en vivo de ventas para rentar el sistema. 
                Explica el inmenso valor de controlar mantenimientos, logística y empleados usando Inteligencia Artificial.
                Sé breve, ejecutiva y contundente.`;

                const response = await fetch(URL_VERCEL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, systemPrompt: systemPrompt })
                });

                if (!response.ok) {
                    throw new Error("HTTP error " + response.status);
                }

                const data = await response.json();
                
                if (data.error) {
                    document.getElementById(thinkId).parentElement.innerHTML = "Error de Vercel: " + data.error;
                    return;
                }

                document.getElementById(thinkId).parentElement.innerHTML = data.candidates[0].content.parts[0].text;
                setTimeout(() => { document.getElementById('matrix-flow').scrollTop = document.getElementById('matrix-flow').scrollHeight; }, 100);
            } catch (e) {
                document.getElementById(thinkId).parentElement.innerHTML = "Fallo de conexión. Revise la red.";
            }
        }

        function startVoiceAction() {
            const mic = document.getElementById('mic-icon');
            mic.className = "fa-solid fa-spinner animate-spin text-black";
            appendLog('jeremy', "Dictado activo. Toque el teclado y presione el micrófono para hablarme.");
            setTimeout(() => { mic.className = "fa-solid fa-microphone text-black"; }, 3000);
        }
    </script>
</body>
</html>
