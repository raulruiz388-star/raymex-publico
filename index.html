<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raymex | Dossier de Operatividad VIP</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/zV60f1gm/1000644130-modified.png">
    <meta name="theme-color" content="#020617">
    <link rel="icon" href="https://i.ibb.co/zV60f1gm/1000644130-modified.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { font-family: 'Urbanist', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; overflow-x: hidden; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; }
        .gold-text { color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
        
        .card-auto { border-left: 6px solid #bef264; }
        .card-hogar { border-left: 6px solid #10b981; }
        .card-empresa { border-left: 6px solid #0ea5e9; }

        .view { display: none; opacity: 0; }
        .view.active { display: block; opacity: 1; animation: fadeIn 0.5s ease-out; }
        
        #login-gate { position: fixed; inset: 0; z-index: 100; background: #020617; display: flex; align-items: center; justify-content: center; padding: 24px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nav-btn { position: relative; font-size: 10px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; color: #64748b; padding: 4px; transition: 0.3s; }
        .nav-btn.active { color: #d4af37; }
        .nav-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2px; background: #d4af37; }

        .hero-section {
            min-height: 85vh;
            background-image: linear-gradient(to bottom right, #020617, rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.6)), url('https://i.ibb.co/Q3K8jmZY/1772302212490.png');
            background-size: cover; background-position: center; display: flex; align-items: center; padding: 80px 24px 40px 24px; position: relative;
        }
    </style>
</head>
<body class="pb-12">

    <div id="login-gate">
        <div class="glass-card p-10 w-full max-w-sm text-center border-gold/20 border-2">
            <img src="https://i.ibb.co/zV60f1gm/1000644130-modified.png" class="h-20 mx-auto mb-6">
            <h2 class="text-white font-black tracking-tighter text-xl uppercase italic">Sistema Raymex</h2>
            <p class="gold-text text-[9px] tracking-[0.3em] font-bold mb-8">SOM V11 | ACCESO RESTRINGIDO</p>
            
            <input type="password" id="master-key" placeholder="LLAVE MAESTRA" 
                class="w-full bg-slate-900/50 border border-gold/30 rounded-xl p-4 text-center text-white tracking-[0.5em] mb-4 outline-none focus:border-gold">
            
            <button onclick="checkKey()" class="w-full bg-gold text-slate-900 font-black py-4 rounded-xl uppercase text-xs tracking-widest hover:brightness-110 transition">Iniciar Protocolo</button>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <nav class="fixed top-0 w-full z-50 bg-[#020617]/95 backdrop-blur-xl border-b border-white/5">
            <div class="max-w-5xl mx-auto px-4 h-20 flex justify-between items-center text-white">
                <div class="flex items-center gap-2 cursor-pointer" onclick="changeView('home')">
                    <img src="https://i.ibb.co/zV60f1gm/1000644130-modified.png" alt="Raymex" class="h-10 w-10 sm:h-12 sm:w-12 object-contain">
                    <div>
                        <h1 class="text-base sm:text-lg font-black tracking-tighter uppercase italic leading-none">Raymex</h1>
                        <p class="text-[7px] sm:text-[8px] gold-text uppercase tracking-widest font-bold mt-1">Gestión de Activos</p>
                    </div>
                </div>
                <div class="flex gap-2 sm:gap-6">
                    <button onclick="changeView('home')" id="btn-home" class="nav-btn active">Inicio</button>
                    <button onclick="changeView('auto')" id="btn-auto" class="nav-btn">Auto</button>
                    <button onclick="changeView('hogar')" id="btn-hogar" class="nav-btn">Hogar</button>
                    <button onclick="changeView('empresa')" id="btn-empresa" class="nav-btn">Empresa</button>
                </div>
            </div>
        </nav>

        <main id="home" class="view active">
            <section class="hero-section">
                <div class="max-w-4xl mx-auto w-full relative z-10">
                    <div class="w-16 h-1.5 bg-gold mb-8"></div>
                    <h2 class="text-4xl md:text-8xl font-black mb-6 leading-[0.9] uppercase italic text-white tracking-tighter">EL LEGADO DE <br><span class="gold-text">UNA VISIÓN.</span></h2>
                    <p class="text-lg md:text-2xl font-light italic text-slate-200 mb-10 max-w-xl italic">"Protejo este negocio con el mismo rigor con el que cuido el futuro de mi familia."</p>
                </div>
            </section>
        </main>
        
        </div>

    <script>
        function checkKey() {
            const key = document.getElementById('master-key').value.trim().toUpperCase();
            if (key === 'RUIZ_MASTER' || key === 'HIJA_CONTROL' || key === 'ROBERTO_SENTINEL') {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                localStorage.setItem('raymex_auth', 'active');
            } else {
                alert('LLAVE INVÁLIDA');
            }
        }

        if (localStorage.getItem('raymex_auth') === 'active') {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        function changeView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const btn = document.getElementById('btn-' + id);
            if(btn) btn.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
