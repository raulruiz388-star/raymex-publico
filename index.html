<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jeremy V29 | Platform Genesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --cyan: #22d3ee; --dark: #020617; }
        body, html { height: 100dvh; margin: 0; background: var(--dark); color: #f8fafc; font-family: 'Urbanist', sans-serif; overflow: hidden; position: fixed; width: 100%; }
        .glass { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        #matrix-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .console-footer { padding: 12px; padding-bottom: calc(env(safe-area-inset-bottom) + 12px); background: #020617; border-top: 1px solid rgba(34, 211, 238, 0.3); }
        .nexus-btn { width: 55px; height: 55px; border-radius: 15px; background: var(--cyan); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .no-select { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body class="flex flex-col">

    <div id="access-vault" class="fixed inset-0 z-[9999] bg-[#020617] flex items-center justify-center p-6">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm text-center border-t-4 border-[#22d3ee]">
            <h2 class="font-orbitron text-xl font-black mb-1 text-white uppercase italic">RAYMEX GENESIS</h2>
            <p class="text-[8px] text-[#22d3ee] uppercase tracking-[0.3em] mb-8 font-black">Sistemas Raymex Operando en Tiempo Real</p>
            <input type="password" id="vault-key" placeholder="LLAVE MAESTRA" class="w-full bg-slate-900 border border-white/10 rounded-2xl py-4 text-center text-white mb-6 outline-none font-bold uppercase text-xs">
            <button onclick="authenticateKey()" class="w-full bg-[#22d3ee] text-slate-950 font-black py-4 rounded-2xl uppercase italic tracking-widest active:scale-95 transition-all">Desbloquear</button>
        </div>
    </div>

    <header class="p-4 bg-slate-950 flex justify-between items-center pt-[env(safe-area-inset-top)] border-b border-cyan-500/30">
        <div class="flex items-center gap-2 no-select active:scale-95 transition-transform cursor-pointer" onclick="resetVault()">
            <img src="https://i.ibb.co/7NW9gd2F/1000644125-modified.png" class="h-8 w-8 object-contain pointer-events-none">
            <h1 class="text-[10px] font-orbitron font-black text-white uppercase tracking-widest">Jeremy <span class="text-[#22d3ee]">V29</span></h1>
        </div>
        <div id="badge-display" class="px-2 py-1 rounded-md text-[8px] font-black uppercase bg-white/5 border border-white/10 text-white italic">ESPERANDO...</div>
    </header>

    <main id="matrix-flow"></main>

    <footer class="console-footer">
        <div class="flex items-center gap-2 max-w-5xl mx-auto">
            <div class="flex-grow bg-slate-900/80 rounded-xl border border-white/10 flex items-center px-3">
                <textarea id="matrix-input" placeholder="Dictar orden operativa..." class="w-full bg-transparent py-3 text-[15px] text-white outline-none h-11 resize-none"></textarea>
                <button onclick="processCommand()" class="p-2 text-[#22d3ee] active:scale-75"><i class="fa-solid fa-paper-plane text-lg"></i></button>
            </div>
            <div onclick="startVoiceAction()" class="nexus-btn active:scale-90"><i id="mic-icon" class="fa-solid fa-microphone text-black text-lg"></i></div>
        </div>
    </footer>

    <script>
        const URL_VERCEL = "https://jeremy-core-v23.vercel.app/api/chat";
        let currentAuthority = "";

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text.replace(/[*_#]/g, ''));
                msg.lang = 'es-MX';
                msg.rate = 1.0;
                window.speechSynthesis.speak(msg);
            }
        }

        function authenticateKey() {
            const key = document.getElementById('vault-key').value.trim().toUpperCase();
            if (['RUIZ_MASTER', 'CONTADOR_MASTER', 'ABOGADO_MASTER'].includes(key)) {
                currentAuthority = key.split('_')[0];
                document.getElementById('badge-display').innerText = currentAuthority + " ACTIVE";
                document.getElementById('access-vault').style.display = 'none';
                
                const welcome = "Sistemas Raymex operando en tiempo real. Bienvenida, autoridad " + currentAuthority;
                appendLog('jeremy', welcome);
                speak(welcome);
            } else { alert("ACCESO DENEGADO"); }
        }

        // FUNCIÓN DEL LOGO: SALIR Y CAMBIAR DE LLAVE
        function resetVault() {
            if(confirm("¿Cerrar sesión y cambiar de autoridad operativa?")) {
                document.getElementById('access-vault').style.display = 'flex';
                document.getElementById('vault-key').value = '';
                document.getElementById('matrix-flow').innerHTML = '';
                window.speechSynthesis.cancel();
            }
        }

        function appendLog(role, text) {
            const flow = document.getElementById('matrix-flow');
            const div = document.createElement('div');
            div.className = `flex gap-3 ${role === 'user' ? 'flex-row-reverse' : ''}`;
            div.innerHTML = `
                <div class="w-8 h-8 rounded-lg ${role==='user'?'bg-slate-700':'bg-[#22d3ee]'} flex items-center justify-center shrink-0 shadow-lg">
                    <i class="fa-solid ${role==='user'?'fa-user-tie':'fa-robot'} text-[10px] ${role==='user'?'text-white':'text-black'}"></i>
                </div>
                <div class="glass p-3 rounded-xl max-w-[85%] ${role==='user'?'border-r-2 border-amber-500':'border-l-2 border-[#22d3ee]'}">
                    <p class="text-[14px] text-slate-200">${text}</p>
                </div>`;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        async function processCommand(manualText = null) {
            const input = document.getElementById('matrix-input');
            const text = manualText || input.value.trim();
            if(!text) return;

            appendLog('user', text);
            input.value = '';
            
            const thinkId = 'think-' + Date.now();
            appendLog('jeremy', `<span id="${thinkId}" class="animate-pulse">Consultando Sapiencia Raymex...</span>`);

            try {
                const response = await fetch(URL_VERCEL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                document.getElementById(thinkId).parentElement.innerHTML = aiText;
                speak(aiText);
            } catch (e) {
                document.getElementById(thinkId).parentElement.innerHTML = "Error de conexión con el núcleo.";
            }
        }

        function startVoiceAction() {
            const mic = document.getElementById('mic-icon');
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                const rec = new SpeechRecognition();
                rec.lang = 'es-MX';
                rec.onstart = () => { mic.className = "fa-solid fa-wave-square animate-pulse text-white"; };
                rec.onresult = (e) => {
                    mic.className = "fa-solid fa-microphone text-black";
                    processCommand(e.results[0][0].transcript);
                };
                rec.onerror = () => { mic.className = "fa-solid fa-microphone text-black"; };
                rec.start();
            }
        }
    </script>
</body>
</html>
